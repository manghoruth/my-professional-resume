name: Build and Push to ECR

on:
  push:
   # pull_request:
   #  branches:  ['main', 'dev']
   branches: ['main',]

permissions:
        id-token: write
        contents: read    

jobs:
    build_scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.9'

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install bandit

            - name: Run trivy scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: 'fs'
                severity: 'HIGH,CRITICAL'
                exit-code: '1'

            - name: Build Docker image
              run: docker build -t ${{ secrets.ECR_REPO }}.dkr.ecr.us-east-1.amazonaws.com/demo_repo:latest .
              
            - name: Scan docker image
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: 'image'
                image-ref: ${{ secrets.ECR_REPO }}/demo_repo:latest
                format: 'table'
                ignore-unfixed: true
                severity: 'HIGH,CRITICAL'
                exit-code: '0'

            - name: configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_ROLE }}/github-action-role
                role-session-name: GitHubActions
                aws-region: us-east-1

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Push Docker image to Amazon ECR
              run: |
                docker tag ${{ secrets.ECR_REPO }}/demo_repo:latest ${{ secrets.ECR_REPO }}/demo_repo:latest
                docker push ${{ secrets.ECR_REPO }}/demo_repo:latest   
